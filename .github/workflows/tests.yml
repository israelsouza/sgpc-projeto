name: Tests (Pytest)

on:
  push:
    paths:
      - "api/**"
  pull_request:
    paths:
      - "api/**"

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: sgpc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install

      - name: Generate Prisma Client
        run: poetry run prisma generate

      - name: Setup Database (Push Schema)
        run: poetry run prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/sgpc_test

      - name: Run tests
        run: poetry run pytest -v
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/sgpc_test
          SECRET_KEY: test_secret_key_123
